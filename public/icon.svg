<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#6b1520"/>

  <!-- Subtle glow -->
  <defs>
    <radialGradient id="glow" cx="0.35" cy="0.65" r="0.7">
      <stop offset="0%" stop-color="#862028" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6b1520" stop-opacity="0"/>
    </radialGradient>
    <!-- Blend mask for overlapping area -->
    <mask id="overlap">
      <rect width="512" height="512" fill="white"/>
      <circle cx="222" cy="256" r="115" fill="black"/>
    </mask>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Left circle — solid cream -->
  <circle cx="222" cy="256" r="115" fill="#f0ebe3" opacity="0.9"/>

  <!-- Right circle — only the non-overlapping part is full opacity -->
  <circle cx="290" cy="256" r="115" fill="#f0ebe3" opacity="0.9" mask="url(#overlap)"/>

  <!-- Overlap area — slightly different tone to show the blend -->
  <clipPath id="leftClip">
    <circle cx="222" cy="256" r="115"/>
  </clipPath>
  <circle cx="290" cy="256" r="115" fill="#f0ebe3" opacity="0.5" clip-path="url(#leftClip)"/>
</svg>
